<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Popup Test</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 0 18px;
        line-height: 1.6;
      }
      .note {
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        padding: 14px 16px;
        border-radius: 10px;
        color: #334155;
      }
      code { background: #e2e8f0; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>

  <body>
    <h1>Chatbot Popup (Real-time)</h1>
    <div class="note">
      Backend API must be running at <code>http://localhost:5000</code>.
      Open this file in browser, then click the 💬 bubble (bottom-right).
    </div>

    <!-- Use the built widget from chatbot/dist -->
    <link rel="stylesheet" href="../chatbot/dist/chatbot.css" />
    <script src="../chatbot/dist/chatbot.min.js"></script>

    <script>
      window.ChatbotWidget.init({
        apiEndpoint: 'http://localhost:5000',
        botName: 'Support Bot',
        welcomeMessage: 'Hi! How can I help you today?',
        primaryColor: '#3B82F6',
        position: 'bottom-right',
      });
    </script>
  </body>

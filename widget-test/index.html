<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Popup Test</title>
    <style>
      :root {
        color: #24160b;
        background: #fff8eb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 0;
        line-height: 1.6;
        background:
          linear-gradient(rgba(45, 24, 8, 0.52), rgba(22, 11, 3, 0.68)),
          url("https://images.unsplash.com/photo-1509391366360-2e959784a276?auto=format&fit=crop&w=1800&q=80") center / cover fixed;
      }

      main {
        min-height: 100vh;
        display: grid;
        align-content: center;
        width: min(1040px, calc(100% - 36px));
        margin: 0 auto;
        padding: 44px 0 120px;
      }

      .hero {
        color: #fff;
        max-width: 680px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #facc15;
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 6vw, 4.8rem);
        line-height: 0.98;
      }

      .hero p {
        margin: 18px 0 0;
        color: #ffe8b2;
        font-size: 1.08rem;
        max-width: 560px;
      }

      .note {
        margin-top: 28px;
        max-width: 660px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid #f3dfb8;
        padding: 18px 20px;
        border-radius: 8px;
        color: #6b3d0f;
        box-shadow: 0 18px 45px rgba(45, 24, 8, 0.18);
      }

      code {
        background: #fff3d1;
        color: #c2410c;
        padding: 2px 6px;
        border-radius: 6px;
        font-weight: 700;
      }
    </style>
  </head>

  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Solar widget test</p>
        <h1>Solar chatbot experience</h1>
        <p>Preview the embedded assistant with the same warm orange, yellow, and sunlit visual direction used across the admin portal.</p>
      </section>
      <div class="note">
        <!-- Backend API must be running at <code>http://172.16.1.67:5000</code>. -->
        Backend API must be running at <code>http://localhost:5000</code>.
        Open this page, then click the assistant bubble in the bottom-right corner.
      </div>
    </main>

    <link rel="stylesheet" href="../chatbot/dist/chatbot.css" />
    <script src="../chatbot/dist/chatbot.min.js"></script>

    <script>
      window.ChatbotWidget.init({
        // apiEndpoint: 'http://172.16.1.67:5000',
        apiEndpoint: 'http://localhost:5000',
        botName: 'Solar Assistant',
        welcomeMessage: 'Hi! How can I help you with solar panels or solar systems today?',
        primaryColor: '#F59E0B',
        position: 'bottom-right',
      });
    </script>
  </body>
</html>
